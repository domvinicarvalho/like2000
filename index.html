<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIKE 2000</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- TELA 1: LOGIN / CADASTRO -->
  <div class="login-screen" id="tela-login">
    <div class="logo">LIKE 2000</div>
    <div class="sub">internet alternativa desde 2007</div>

    <div class="login-box">
      <div class="login-tabs">
        <button class="tab-btn active" onclick="alternarTab('entrar')">Entrar</button>
        <button class="tab-btn" onclick="alternarTab('cadastrar')">Criar conta</button>
      </div>

      <div id="tab-entrar">
        <input type="email" id="login-email" placeholder="seu e-mail">
        <input type="password" id="login-senha" placeholder="sua senha">
        <button onclick="fazerLogin()">ENTRAR</button>
        
        <div class="social-divider"><span>ou conecte-se com</span></div>
        <div class="social-btns">
          <button class="social-btn google" onclick="loginSocial('google')">Google</button>
          <button class="social-btn discord" onclick="loginSocial('discord')">Discord</button>
          <button class="social-btn twitter" onclick="loginSocial('twitter')">X / Twitter</button>
        </div>

        <div class="auth-msg" id="msg-login"></div>
      </div>

      <div id="tab-cadastrar" style="display:none">
        <input type="email" id="cad-email" placeholder="seu e-mail">
        <input type="password" id="cad-senha" placeholder="crie uma senha">
        <button onclick="fazerCadastro()">CRIAR CONTA</button>
        <div class="auth-msg" id="msg-cadastro"></div>
      </div>
    </div>
  </div>

  <audio id="startup">
    <source src="https://archive.org/download/windowsxpstartup_201910/Windows%20XP%20Startup.mp3">
  </audio>

  <script src="script.js"></script>
</body>
</html>
