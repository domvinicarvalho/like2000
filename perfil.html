<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>orkut - perfil</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background-color: #C9D6E8; margin: 0; padding: 0; font-family: Tahoma, Arial, sans-serif; font-size: 11px; color: #333; }
    a { color: #3B5998; text-decoration: none; font-weight: normal; }
    a:hover { text-decoration: underline; }

    .navbar { background-color: #6D84B4; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; height: 35px; border-bottom: 1px solid #3B5998; }
    .logo { cursor: default; display: flex; align-items: center; gap: 4px; }
    .nav-links { color: #D0DAE8; font-size: 11px; }
    .nav-links span { margin-left: 10px; opacity: 0.8; cursor: default; }

    .container { width: 960px; margin: 15px auto; display: flex; gap: 12px; align-items: flex-start; }
    .col-esquerda { width: 170px; display: flex; flex-direction: column; background: #FFFFFF; border-radius: 8px; padding: 10px; box-sizing: border-box; box-shadow: 0 1px 2px rgba(0,0,0,0.15); }
    .col-centro { flex: 1; display: flex; flex-direction: column; gap: 12px; }
    .col-direita { width: 230px; display: flex; flex-direction: column; gap: 12px; }

    /* Coluna Esquerda */
    .profile-pic-container { text-align: center; margin-bottom: 12px; }
    .profile-pic { width: 100px; height: 100px; object-fit: cover; background: #eee; border: 3px solid #FFFFFF; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .side-name { font-weight: bold; margin-top: 4px; display: block; }
    .side-meta { font-size: 10px; color: #666; margin-top: 2px; }
    .side-menu { margin-top: 10px; border-top: 1px solid #C5D5E8; padding-top: 8px; }
    .menu-item { display: flex; align-items: center; gap: 6px; padding: 4px 0; font-size: 11px; color: #3B5998; opacity: 1.0; }
    .menu-item.disabled { color: #999; cursor: default; }
    .add-friend-btn { background-color: #EEF3F8; color: #3B5998 !important; border: 1px solid #6D84B4; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-weight: normal; width: 100%; margin-bottom: 10px; font-size: 10px; display: flex; align-items: center; justify-content: center; gap: 4px; box-sizing: border-box; }
    .add-friend-btn:hover { background-color: #D9E1F7; text-decoration: none; }

    /* Coluna Centro */
    .main-name { font-size: 22px; color: #6D84B4; font-weight: normal; margin-bottom: 4px; }
    .stats-line { font-size: 10px; color: #666; margin-bottom: 15px; border-bottom: 1px solid #C5D5E8; padding-bottom: 5px; }
    .stats-line span { color: #3B5998; margin: 0 5px; }
    
    .tabs { display: flex; border-bottom: 1px solid #6D84B4; }
    .tab { background: #EEF3F8; border: 1px solid #6D84B4; border-bottom: none; padding: 4px 12px; font-weight: bold; color: #6D84B4; border-radius: 4px 4px 0 0; position: relative; top: 1px; }
    .tab.active { background: #6D84B4; color: #FFF; }

    .info-table { width: 100%; border-collapse: collapse; background: #FFF; border: 1px solid #6D84B4; border-top: none; }
    .info-table tr:nth-child(even) { background: #EEF3F8; }
    .info-table tr:nth-child(odd) { background: #FFFFFF; }
    .info-table td { padding: 5px 8px; vertical-align: top; }
    .info-table .label { color: #6D84B4; font-weight: bold; width: 150px; text-align: right; }

    .col-centro-card { background: #FFFFFF; border-radius: 8px; border: 1px solid #C9D6E8; padding: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

    .votes-line { display: flex; gap: 12px; margin-bottom: 15px; }
    .vote-item { display: flex; align-items: center; gap: 3px; cursor: pointer; font-size: 10px; color: #666; opacity: 0.6; transition: opacity 0.2s; user-select: none; }
    .vote-item.voted { opacity: 1; font-weight: bold; color: #333; }

    /* Coluna Direita & Boxes */
    .box { background: #FFFFFF; border: 1px solid #6D84B4; }
    .box-header { background: #6D84B4; color: #FFFFFF; padding: 3px 6px; font-weight: bold; font-size: 11px; display: flex; justify-content: space-between; }
    .box-content { padding: 10px; }
    .box-footer { background: #EEF3F8; padding: 3px 6px; text-align: right; border-top: 1px solid #6D84B4; }

    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; text-align: center; }
    .grid-item img { width: 60px; height: 60px; object-fit: cover; border: 1px solid #C5D5E8; background: #f0f0f0; }
    .grid-item span { display: block; font-size: 9px; margin-top: 2px; height: 24px; overflow: hidden; color: #3B5998; }

    .level-text { font-size: 10px; color: #333; margin-top: 5px; }
    .coupon-box { margin-top: 5px; font-size: 10px; color: #666; font-style: italic; }
    .report-link { font-size: 9px; color: #666; cursor: pointer; margin-top: 20px; opacity: 0.5; }
    .error-msg { text-align: center; padding: 50px; font-size: 18px; color: #FFF; font-weight: bold; }

    /* Ajustes Mobile para preservar o visual "Desktop" do Orkut */
    @media (max-width: 650px) {
      .container { width: 100%; margin: 5px 0; display: block; }
      
      /* Transforma a coluna esquerda em um header compacto */
      .col-esquerda { 
        width: 100% !important; 
        flex-direction: row !important; 
        border-radius: 0; 
        box-shadow: none;
        border-bottom: 1px solid #C5D5E8;
        padding: 10px;
        gap: 15px;
        box-sizing: border-box;
      }
      .profile-pic-container { margin-bottom: 0; text-align: left; }
      .profile-pic { width: 70px; height: 70px; }
      .side-menu { display: none; } /* Oculta o menu lateral para focar no conteúdo principal */
      .add-friend-btn { width: auto; margin-bottom: 0; padding: 4px 10px; font-size: 10px; }

      .col-centro { width: 100% !important; padding: 10px; box-sizing: border-box; }
      .col-centro-card { padding: 10px; border: none; box-shadow: none; }
      .main-name { font-size: 18px; margin-bottom: 2px; }
      .stats-line { font-size: 9px; margin-bottom: 10px; }
      
      .info-table .label { width: 90px; padding: 4px; font-size: 10px; }
      .info-table td { padding: 4px; font-size: 10px; }
      
      .votes-line { gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }

      .col-direita { width: 100% !important; padding: 10px; box-sizing: border-box; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">
      <div style="background:#E8457A; border-radius:4px; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-family:Georgia; font-style:italic; color:white; font-size:14px; font-weight:bold;">o</div>
      <span style="font-family:Georgia; font-style:italic; color:white; font-size:22px; font-weight:bold;">rkut</span>
    </div>
    <div class="nav-links">
      <span>Início</span> | <span>Página de recados</span> | <span>Amigos</span> | <span>Comunidades</span>
    </div>
  </div>

  <div id="main-content">
    <!-- Renderizado via JS -->
  </div>

  <script>
    let votosUsuario = { confiavel: false, legal: false, sexy: false };
    let votosCounts = { confiavel: 0, legal: 0, sexy: 0 };

    const supabaseClient = supabase.createClient(
      'https://hjglujffcjbrmugoprjh.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqZ2x1amZmY2picm11Z29wcmpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NTQ5NjUsImV4cCI6MjA5NDUzMDk2NX0.hbeP1zWBYvsH9BCsoyaBOkoZfIvY9U1uXdSSwxmuvos'
    );

    const LEVELS = [
      { name:'Rookie', min:0 }, { name:'Insider', min:100 }, { name:'Cult Member', min:300 },
      { name:'Legend', min:700 }, { name:'Bad Idea Elite', min:1500 }
    ];

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const nick = params.get('u');
      if (!nick) { renderError("Nickname não fornecido."); return; }

      const { data: profile, error } = await supabaseClient.from('profiles').select('*').ilike('nickname', nick).single();
      if (error || !profile) { renderError("Perfil não encontrado."); return; }

      const { data: { session } } = await supabaseClient.auth.getSession();
      const isMe = session?.user?.id === profile.id;
      
      let isFriend = false;
      if (session?.user && !isMe) {
        const { data: friendship } = await supabaseClient.from('friendships')
          .select('status')
          .or(`and(user_id.eq.${session.user.id},friend_id.eq.${profile.id}),and(user_id.eq.${profile.id},friend_id.eq.${session.user.id})`)
          .in('status', ['accepted', 'pending'])
          .maybeSingle();
        isFriend = !!friendship;
      }

      console.log('DEBUG +AMIGO:', { isMe, isFriend, loggedIn: !!session?.user, targetId: profile.id });

      renderProfile(profile, isMe, isFriend, session?.user);
    }

    function renderError(msg) {
      document.getElementById('main-content').innerHTML = `<div class="error-msg">${msg}</div>`;
    }

    function renderProfile(p, isMe, isFriend, currentUser) {
      const date = new Date(p.created_at).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
      let nextMin = 1500;
      for(let l of LEVELS) { if (l.min > p.xp) { nextMin = l.min; break; } }
      const xpPct = Math.min(100, (p.xp / nextMin) * 100);

      const verifiedBadge = p.is_verified ? '<span title="Perfil Verificado (Bad Idea)" style="margin-left:4px; font-size:14px; cursor:help;">⭐</span>' : '';

      document.getElementById('main-content').innerHTML = `
        <div class="container">
          <!-- COLUNA ESQUERDA -->
          <div class="col-esquerda">
            <div class="profile-pic-container">
              <img src="${p.avatar_url || 'https://www.gravatar.com/avatar/000?d=mp'}" class="profile-pic">
              <span class="side-name">${p.nickname}${verifiedBadge}</span>
              <div class="side-meta">${p.city || 'não informado'}<br>${p.identidade_sexual || ''}</div>
            </div>
            
            ${!isMe && !isFriend ? (
              currentUser 
              ? `<a href="javascript:void(0)" style="text-decoration:none;" onclick="adicionarAmigo('${p.id}')"><span class="add-friend-btn">adicionar como amigo</span></a>` 
              : `<a href="index.html" style="text-decoration:none;"><span class="add-friend-btn">adicionar como amigo</span></a>`
            ) : ''}

            <div class="side-menu">
              <a href="#" class="menu-item">👤 perfil</a>
              <div class="menu-item disabled">✉️ recados</div>
              <div class="menu-item disabled">📷 fotos</div>
              <div class="menu-item disabled">🎥 vídeos</div>
              <div class="menu-item disabled">💬 depoimentos</div>
            </div>
            <div class="report-link" onclick="denunciar('${p.nickname}')">denunciar conteúdo impróprio</div>
          </div>

          <!-- COLUNA CENTRO -->
          <div class="col-centro">
            <div class="col-centro-card">
              <div class="main-name">${p.nickname}${verifiedBadge}</div>
              <div class="stats-line">
                recados <span>0</span> | fotos <span>0</span> | vídeos <span>0</span> | fãs <span>0</span>
              </div>

              <div class="votes-line">
                <div class="vote-item" id="item-confiavel" onclick="toggleVote('${p.id}', 'confiavel')">
                  <span class="vote-icon" title="confiável">⭐</span> confiável: <span id="count-confiavel">—</span>
                </div>
                <div class="vote-item" id="item-legal" onclick="toggleVote('${p.id}', 'legal')">
                  <span class="vote-icon" title="legal">💙</span> legal: <span id="count-legal">—</span>
                </div>
                <div class="vote-item" id="item-sexy" onclick="toggleVote('${p.id}', 'sexy')">
                  <span class="vote-icon" title="sexy">❤️</span> sexy: <span id="count-sexy">—</span>
                </div>
              </div>

              <div class="tabs">
                <div class="tab active">social</div>
              </div>

              <table class="info-table">
                <tr><td class="label">relacionamento:</td><td>${p.relacionamento || 'não informado'}</td></tr>
                <tr><td class="label">aniversário:</td><td>não informado</td></tr>
                <tr><td class="label">identidade sexual:</td><td>${p.identidade_sexual || 'não informado'}</td></tr>
                <tr><td class="label">músicas:</td><td>${p.musicas || 'não informado'}</td></tr>
                <tr><td class="label">filmes:</td><td>${p.filmes || 'não informado'}</td></tr>
                <tr><td class="label">livros:</td><td>${p.livros || 'não informado'}</td></tr>
                <tr><td class="label">esportes:</td><td>${p.esportes || 'não informado'}</td></tr>
                <tr><td class="label">sobre mim:</td><td style="white-space:pre-wrap;">${p.bio || 'não informado'}</td></tr>
                <tr><td class="label">cidade natal:</td><td>${p.city || 'não informado'}</td></tr>
                <tr><td class="label">membro desde:</td><td>${date}</td></tr>
              </table>
            </div>
          </div>

          <!-- COLUNA DIREITA -->
          <div class="col-direita">
            <!-- AMIGOS BOX -->
            <div class="box" id="box-amigos">
              <div class="box-header">amigos <span id="count-amigos">(0)</span></div>
              <div class="box-content grid-3" id="grid-amigos">
                <div style="grid-column: span 3; color: #999; font-style: italic; padding: 10px 0;">carregando...</div>
              </div>
              <div class="box-footer"><a href="#">ver todos</a></div>
            </div>

            <!-- COMUNIDADES BOX -->
            <div class="box">
              <div class="box-header">comunidades <span id="count-comunidades">(0)</span></div>
              <div class="box-content">
                <div class="grid-3" id="grid-comunidades">
                  <div style="grid-column: span 3; color: #999; font-style: italic; padding: 10px 0;">carregando...</div>
                  </div>
                </div>
              </div>
              <div class="box-footer"><a href="#">ver todas</a></div>
            </div>

            <!-- BOX LIKE 2000 -->
            <div class="box">
              <div class="box-header">like 2000</div>
              <div class="box-content">
                <div class="level-text"><b>nível:</b> ${p.level} (${p.xp} XP)</div>
                <div class="coupon-box" style="word-break: break-all;"><b>cupom:</b> ${p.referral_code || '---'}</div>
              </div>
            </div>
          </div>
        </div>`;
        carregarAmigosPublicos(p.id);
        carregarVotos(p.id, currentUser?.id);
        carregarComunidadesPublicas(); // Nova chamada para carregar comunidades
    }

    // Nova função para carregar e exibir comunidades
    async function carregarComunidadesPublicas() {
      const container = document.getElementById('grid-comunidades');
      const countSpan = document.getElementById('count-comunidades');
      if (!container || !countSpan) return;

      const { data, error } = await supabaseClient
        .from('communities')
        .select('*')
        .order('name', { ascending: true });

      if (error) {
        container.innerHTML = '<div style="grid-column: span 3; color: red; font-size: 10px;">Erro ao carregar comunidades.</div>';
        countSpan.innerText = '(0)';
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = '<div style="grid-column: span 3; color: #999; font-style: italic; padding: 10px 0;">Nenhuma comunidade ainda.</div>';
        countSpan.innerText = '(0)';
        return;
      }

      container.innerHTML = data.map(c => `
        <div class="grid-item">
          <img src="${c.image_url || 'data:image/svg+xml;charset=utf-8,%3Csvg%20viewBox%3D%220%200%2048%2048%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Crect%20width%3D%2248%22%20height%3D%2248%22%20rx%3D%228%22%20fill%3D%22%23E8457A%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2255%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20fill%3D%22white%22%20font-family%3D%22Georgia%22%20font-style%3D%22italic%22%20font-weight%3D%22bold%22%20font-size%3D%2234%22%3Eo%3C%2Ftext%3E%3C%2Fsvg%3E'}" onerror="this.src='data:image/svg+xml;charset=utf-8,%3Csvg%20viewBox%3D%220%200%2048%2048%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Crect%20width%3D%2248%22%20height%3D%2248%22%20fill%3D%22%23E8457A%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2255%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20fill%3D%22white%22%20font-family%3D%22Georgia%22%20font-style%3D%22italic%22%20font-weight%3D%22bold%22%20font-size%3D%2234%22%3Eo%3C%2Ftext%3E%3C%2Fsvg%3E'">
          <span>${c.name}</span>
        </div>
      `).join('');
      countSpan.innerText = `(${data.length})`;
    }

    function atualizarVotosUI() {
      const total = votosCounts.confiavel + votosCounts.legal + votosCounts.sexy;
      const tipos = ['confiavel', 'legal', 'sexy'];
      
      tipos.forEach(type => {
        const el = document.getElementById('count-' + type);
        const item = document.getElementById('item-' + type);
        if (!el || !item) return;

        if (total === 0) {
          el.innerText = '—';
        } else {
          const pct = Math.round((votosCounts[type] / total) * 100);
          el.innerText = pct + '%';
        }

        if (votosUsuario[type]) item.classList.add('voted');
        else item.classList.remove('voted');
      });
    }

    async function carregarVotos(targetId, currentUserId) {
      const { data: counts } = await supabaseClient.from('profile_votes').select('vote_type').eq('target_id', targetId);
      
      if (counts) {
        votosCounts = counts.reduce((acc, v) => {
          acc[v.vote_type] = (acc[v.vote_type] || 0) + 1;
          return acc;
        }, { confiavel: 0, legal: 0, sexy: 0 });
      }

      if (currentUserId && currentUserId !== targetId) {
        const { data: myVotes } = await supabaseClient.from('profile_votes').select('vote_type').eq('target_id', targetId).eq('voter_id', currentUserId);
        if (myVotes) {
          myVotes.forEach(v => {
            votosUsuario[v.vote_type] = true;
          });
        }
      }
      atualizarVotosUI();
    }

    async function toggleVote(targetId, type) {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      if (session.user.id === targetId) {
        alert("Você não pode votar em si mesmo.");
        return;
      }

      if (votosUsuario[type]) {
        const { error } = await supabaseClient.from('profile_votes').delete().eq('voter_id', session.user.id).eq('target_id', targetId).eq('vote_type', type);
        if (!error) {
          votosUsuario[type] = false;
          votosCounts[type] = Math.max(0, votosCounts[type] - 1);
          atualizarVotosUI();
        }
      } else {
        const { error } = await supabaseClient.from('profile_votes').insert({
          voter_id: session.user.id,
          target_id: targetId,
          vote_type: type
        });
        if (!error) {
          votosUsuario[type] = true;
          votosCounts[type]++;
          atualizarVotosUI();
        } else if (error.code === "23505") {
          votosUsuario[type] = true; 
          atualizarVotosUI();
        }
      }
    }

    async function carregarAmigosPublicos(userId) {
      const { data } = await supabaseClient.from('friendships')
        .select('profiles_user:user_id(nickname,avatar_url,color,id), profiles_friend:friend_id(nickname,avatar_url,color,id)')
        .or(`user_id.eq.${userId},friend_id.eq.${userId}`)
        .eq('status', 'accepted').limit(9);
      
      if (!data || data.length === 0) return;

      const amigos = data.map(f => f.profiles_user.id === userId ? f.profiles_friend : f.profiles_user);
      
      const amigosHtml = amigos.map(a => {
        return `
        <div class="grid-item" onclick="window.location.href='?u=${a.nickname}'" style="cursor:pointer">
          <img src="${a.avatar_url || 'https://www.gravatar.com/avatar/000?d=mp'}">
          <span>${a.nickname}</span>
        </div>`;
      }).join('');

      document.getElementById('grid-amigos').innerHTML = amigosHtml;
      document.getElementById('count-amigos').innerText = `(${amigos.length})`;
    }

    async function adicionarAmigo(targetId) {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      
      try {
        const { data, error } = await supabaseClient.functions.invoke('friendship-request', {
          body: { target_user_id: targetId, action: 'send' }
        });
        if (error) alert('Erro ao enviar.');
        else alert('Solicitação de amizade enviada!');
      } catch (e) { alert('Erro na conexão.'); }
    }

    async function denunciar(nick) {
      const motivo = prompt("Motivo da denúncia contra " + nick + ":");
      if (!motivo) return;
      const { data: { session } } = await supabaseClient.auth.getSession();
      const { error } = await supabaseClient.from('notifications').insert({
        type: 'report',
        user_id: session?.user?.id || null,
        content: `Denúncia contra ${nick}: ${motivo}`
      });
      if (!error) alert("Denúncia enviada para moderação.");
    }

    init();
  </script>
</body>
</html>
